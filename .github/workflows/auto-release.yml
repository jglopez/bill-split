name: Auto-release

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: read

jobs:
  release:
    runs-on: ubuntu-latest
    # Skip Dependabot auto-merge commits
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get merged PR
        id: pr
        run: |
          PR_NUMBER=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" --jq '.[0].number // empty')
          if [ -z "$PR_NUMBER" ]; then
            echo "No PR associated with this push; skipping release." >&2
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          LABELS=$(gh pr view "$PR_NUMBER" --json labels --jq '[.labels[].name] | join(",")')
          echo "labels=$LABELS" >> "$GITHUB_OUTPUT"
          TITLE=$(gh pr view "$PR_NUMBER" --json title --jq '.title')
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          BODY=$(gh pr view "$PR_NUMBER" --json body --jq '.body')
          echo "body<<GHEOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "GHEOF" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine bump type
        id: bump
        if: steps.pr.outputs.skip != 'true'
        run: |
          LABELS="${{ steps.pr.outputs.labels }}"
          if [[ "$LABELS" == *"version:major"* ]]; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif [[ "$LABELS" == *"version:minor"* ]]; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          elif [[ "$LABELS" == *"version:patch"* ]]; then
            echo "type=patch" >> "$GITHUB_OUTPUT"
          else
            echo "No version label found, defaulting to patch."
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Get latest tag and bump
        id: version
        if: steps.pr.outputs.skip != 'true'
        run: |
          LATEST=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$LATEST" ]; then
            LATEST="v0.0.0"
          fi
          IFS='.' read -r major minor patch <<< "${LATEST#v}"
          case "${{ steps.bump.outputs.type }}" in
            major) major=$((major + 1)); minor=0; patch=0 ;;
            minor) minor=$((minor + 1)); patch=0 ;;
            patch) patch=$((patch + 1)) ;;
          esac
          echo "tag=v${major}.${minor}.${patch}" >> "$GITHUB_OUTPUT"

      - name: Update package.json version
        if: steps.pr.outputs.skip != 'true'
        run: |
          VERSION="${{ steps.version.outputs.tag }}"
          VERSION_NUM="${VERSION#v}"
          jq ".version = \"$VERSION_NUM\"" package.json > package.json.tmp
          mv package.json.tmp package.json
          # Use the github-actions[bot] identity so the commit is attributed to
          # the bot account on GitHub (avatar, audit trail) rather than an
          # arbitrary string. ID comes from api.github.com/users/github-actions[bot].
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add package.json
          git commit -m "chore: bump version to $VERSION_NUM"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release
        if: steps.pr.outputs.skip != 'true'
        run: |
          printf '%s\n\n%s\n\nPR: #%s\n' "$TITLE" "$BODY" "$PR_NUMBER" > notes.md
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file notes.md
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.version.outputs.tag }}
          TITLE: ${{ steps.pr.outputs.title }}
          BODY: ${{ steps.pr.outputs.body }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
