name: Dependabot auto-merge

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Find open PR for this commit
        id: pr
        run: |
          PR_NUMBER=$(gh api "repos/${{ github.repository }}/commits/${{ github.event.workflow_run.head_sha }}/pulls" \
            --jq '[.[] | select(.state == "open")] | .[0].number // empty')
          if [ -z "$PR_NUMBER" ]; then
            echo "No open PR found for this commit; skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          PR_HEAD_SHA=$(gh pr view "$PR_NUMBER" --json headRefOid --jq '.headRefOid')
          if [ "$PR_HEAD_SHA" != "${{ github.event.workflow_run.head_sha }}" ]; then
            echo "PR #$PR_NUMBER head is $PR_HEAD_SHA, not the tested SHA ${{ github.event.workflow_run.head_sha }}; skipping."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ACTOR=$(gh pr view "$PR_NUMBER" --json author --jq '.author.login')
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "actor=$ACTOR" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge if Dependabot PR
        if: steps.pr.outputs.skip != 'true' && steps.pr.outputs.actor == 'dependabot[bot]'
        run: gh pr merge --squash "$PR_NUMBER"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
