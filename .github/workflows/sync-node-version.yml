name: Sync Node version

on:
  push:
    branches: [main]
    paths:
      - .nvmrc

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Update ARG NODE_VERSION in Dockerfile
        run: |
          # Skip commits made by this workflow to avoid infinite loops.
          COMMIT_EMAIL=$(git log -1 --format='%ae' "${{ github.sha }}")
          if [ "$COMMIT_EMAIL" = "41898282+github-actions[bot]@users.noreply.github.com" ]; then
            echo "Bot commit; skipping." >&2
            exit 0
          fi

          NODE_VERSION=$(tr -d '[:space:]' < .nvmrc)
          sed -i "s/^ARG NODE_VERSION=.*/ARG NODE_VERSION=${NODE_VERSION}/" Dockerfile

          # No-op if the Dockerfile was already on this version.
          if git diff --quiet Dockerfile; then
            echo "Dockerfile already up to date; nothing to commit."
            exit 0
          fi

          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add Dockerfile
          git commit -m "chore: sync Dockerfile NODE_VERSION to ${NODE_VERSION}"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
